<!DOCTYPE html>
<html>
<head>
<title>Battery Percent</title>
<style>
body {
  background: #111;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  font-family: Arial;
  color: white;

  /* disables highlighting everywhere */
  user-select: none;
}

h1 {
  margin-bottom: 20px;
}

#percentText {
  font-size: 30px;
  margin-bottom: 15px;
}

.battery {
  width: 120px;
  height: 50px;
  border: 4px solid white;
  border-radius: 10px;
  position: relative;
}

.level {
  height: 100%;
  width: 50%;
  background: limegreen;
  border-radius: 6px;
  transition: width 0.5s;
}
</style>
</head>
<body>

<h1>Battery Percent</h1>

<div id="percentText">Loading...</div>

<div class="battery">
  <div class="level" id="level"></div>
</div>

<script>
navigator.getBattery().then(function(battery) {

  function updateBattery() {
    let percent = Math.round(battery.level * 100);

    document.getElementById("level").style.width = percent + "%";
    document.getElementById("percentText").textContent = percent + "%";

    let levelDiv = document.getElementById("level");
    if (percent > 50) levelDiv.style.background = "limegreen";
    else if (percent > 20) levelDiv.style.background = "orange";
    else levelDiv.style.background = "red";
  }

  updateBattery();
  battery.addEventListener("levelchange", updateBattery);
});
</script>

</body>
</html>
